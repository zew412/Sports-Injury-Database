<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>InjuryWire — NBA Injury Intelligence</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,400&family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0c0f;
    --surface: #111418;
    --surface2: #181c22;
    --border: #1e2430;
    --border2: #252d3a;
    --text: #e8edf5;
    --muted: #6b7a94;
    --accent: #00d4ff;
    --accent-dim: rgba(0,212,255,0.08);
    --accent-glow: rgba(0,212,255,0.15);
    --red: #ff4d6d;
    --red-dim: rgba(255,77,109,0.1);
    --orange: #ff9f1c;
    --orange-dim: rgba(255,159,28,0.1);
    --green: #2de076;
    --green-dim: rgba(45,224,118,0.1);
    --yellow: #ffe45e;
    --yellow-dim: rgba(255,228,94,0.1);
    --font-display: 'Bebas Neue', sans-serif;
    --font-body: 'DM Sans', sans-serif;
    --font-mono: 'DM Mono', monospace;
  }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    font-size: 14px;
    line-height: 1.5;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* SCANLINE OVERLAY */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px);
    pointer-events: none;
    z-index: 1000;
  }

  /* HEADER */
  header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(10,12,15,0.92);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    padding: 0 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 56px;
  }

  .logo {
    display: flex;
    align-items: baseline;
    gap: 10px;
  }

  .logo-text {
    font-family: var(--font-display);
    font-size: 28px;
    letter-spacing: 2px;
    color: var(--text);
  }

  .logo-tag {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--accent);
    letter-spacing: 3px;
    text-transform: uppercase;
    border: 1px solid var(--accent);
    padding: 2px 7px;
    border-radius: 2px;
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 20px;
  }

  .live-badge {
    display: flex;
    align-items: center;
    gap: 7px;
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--green);
    letter-spacing: 1px;
  }

  .live-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--green);
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(45,224,118,0.4); }
    50% { opacity: 0.7; box-shadow: 0 0 0 5px rgba(45,224,118,0); }
  }

  .header-stat {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--muted);
  }

  .header-stat span {
    color: var(--text);
  }

  /* TICKER */
  .ticker-wrap {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    overflow: hidden;
    height: 34px;
    display: flex;
    align-items: center;
  }

  .ticker-label {
    background: var(--accent);
    color: #000;
    font-family: var(--font-mono);
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 2px;
    padding: 0 14px;
    height: 100%;
    display: flex;
    align-items: center;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .ticker-track {
    display: flex;
    animation: ticker 60s linear infinite;
    white-space: nowrap;
  }

  .ticker-item {
    font-family: var(--font-mono);
    font-size: 11px;
    padding: 0 40px;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .ticker-item .player { color: var(--text); font-weight: 500; }
  .ticker-item .status-out { color: var(--red); }
  .ticker-item .status-q { color: var(--orange); }
  .ticker-item .status-gtd { color: var(--yellow); }
  .ticker-sep { color: var(--border2); }

  @keyframes ticker {
    0% { transform: translateX(0); }
    100% { transform: translateX(-50%); }
  }

  /* MAIN LAYOUT */
  .main {
    display: grid;
    grid-template-columns: 260px 1fr 300px;
    grid-template-rows: auto 1fr;
    min-height: calc(100vh - 90px);
  }

  /* SIDEBAR LEFT */
  .sidebar-left {
    border-right: 1px solid var(--border);
    padding: 24px 0;
    position: sticky;
    top: 90px;
    height: calc(100vh - 90px);
    overflow-y: auto;
  }

  .sidebar-left::-webkit-scrollbar { width: 3px; }
  .sidebar-left::-webkit-scrollbar-track { background: transparent; }
  .sidebar-left::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

  .section-label {
    font-family: var(--font-mono);
    font-size: 9px;
    letter-spacing: 3px;
    color: var(--muted);
    text-transform: uppercase;
    padding: 0 20px 10px;
  }

  .team-list { padding-bottom: 12px; }

  .team-btn {
    display: flex;
    align-items: center;
    justify-content: space-between;
    width: 100%;
    padding: 8px 20px;
    background: none;
    border: none;
    cursor: pointer;
    color: var(--muted);
    font-family: var(--font-body);
    font-size: 13px;
    text-align: left;
    transition: all 0.15s;
  }

  .team-btn:hover { background: var(--surface2); color: var(--text); }
  .team-btn.active { background: var(--accent-dim); color: var(--accent); border-left: 2px solid var(--accent); padding-left: 18px; }

  .team-count {
    font-family: var(--font-mono);
    font-size: 10px;
    background: var(--surface2);
    border-radius: 10px;
    padding: 1px 7px;
    min-width: 22px;
    text-align: center;
  }

  .team-btn.active .team-count { background: var(--accent-dim); color: var(--accent); }
  .team-btn.has-out .team-count { color: var(--red); }

  .sidebar-divider {
    height: 1px;
    background: var(--border);
    margin: 16px 20px;
  }

  /* STATUS FILTERS */
  .filter-group { padding: 0 20px 8px; }

  .filter-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    width: 100%;
    padding: 7px 10px;
    background: none;
    border: 1px solid transparent;
    border-radius: 6px;
    cursor: pointer;
    color: var(--muted);
    font-family: var(--font-body);
    font-size: 13px;
    margin-bottom: 4px;
    transition: all 0.15s;
  }

  .filter-btn:hover { background: var(--surface2); color: var(--text); }
  .filter-btn.active { border-color: var(--border2); background: var(--surface2); color: var(--text); }

  .filter-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  /* FEED */
  .feed {
    padding: 0;
    overflow-y: auto;
    max-height: calc(100vh - 90px);
  }

  .feed::-webkit-scrollbar { width: 3px; }
  .feed::-webkit-scrollbar-track { background: transparent; }
  .feed::-webkit-scrollbar-thumb { background: var(--border2); }

  .feed-header {
    padding: 20px 28px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    background: rgba(10,12,15,0.95);
    backdrop-filter: blur(10px);
    z-index: 10;
  }

  .feed-title {
    font-family: var(--font-display);
    font-size: 22px;
    letter-spacing: 2px;
    color: var(--text);
  }

  .feed-meta {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--muted);
  }

  .sort-btns {
    display: flex;
    gap: 4px;
  }

  .sort-btn {
    padding: 4px 12px;
    border: 1px solid var(--border);
    background: none;
    color: var(--muted);
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 1px;
    border-radius: 3px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .sort-btn:hover, .sort-btn.active { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }

  /* INJURY CARD */
  .injury-card {
    padding: 20px 28px;
    border-bottom: 1px solid var(--border);
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 16px;
    cursor: pointer;
    transition: background 0.15s;
    animation: fadeSlide 0.4s ease both;
  }

  @keyframes fadeSlide {
    from { opacity: 0; transform: translateY(-8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .injury-card:hover { background: var(--surface2); }
  .injury-card.new-item { background: rgba(0,212,255,0.04); }

  .card-top {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 8px;
  }

  .status-pill {
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 1.5px;
    padding: 3px 9px;
    border-radius: 3px;
    font-weight: 500;
    text-transform: uppercase;
  }

  .status-out { background: var(--red-dim); color: var(--red); border: 1px solid rgba(255,77,109,0.25); }
  .status-questionable { background: var(--orange-dim); color: var(--orange); border: 1px solid rgba(255,159,28,0.25); }
  .status-doubtful { background: var(--red-dim); color: #ff8fa3; border: 1px solid rgba(255,143,163,0.25); }
  .status-gtd { background: var(--yellow-dim); color: var(--yellow); border: 1px solid rgba(255,228,94,0.25); }
  .status-probable { background: var(--green-dim); color: var(--green); border: 1px solid rgba(45,224,118,0.25); }

  .card-team {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 1px;
  }

  .card-new {
    font-family: var(--font-mono);
    font-size: 9px;
    color: var(--accent);
    letter-spacing: 2px;
    animation: blink 1.5s step-end infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0; }
  }

  .player-name {
    font-family: var(--font-display);
    font-size: 26px;
    letter-spacing: 1.5px;
    color: var(--text);
    margin-bottom: 4px;
    line-height: 1;
  }

  .injury-detail {
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 12px;
  }

  .injury-detail strong { color: var(--text); }

  .tweet-box {
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: 8px;
    padding: 12px 14px;
    margin-bottom: 10px;
  }

  .tweet-reporter {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 6px;
  }

  .reporter-avatar {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: var(--border2);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--accent);
    flex-shrink: 0;
  }

  .reporter-info-name {
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
  }

  .reporter-info-handle {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--muted);
  }

  .tier-badge {
    margin-left: auto;
    font-family: var(--font-mono);
    font-size: 9px;
    letter-spacing: 1px;
    padding: 2px 7px;
    border-radius: 2px;
  }

  .tier-1 { background: rgba(0,212,255,0.1); color: var(--accent); border: 1px solid rgba(0,212,255,0.2); }
  .tier-2 { background: rgba(107,122,148,0.1); color: var(--muted); border: 1px solid var(--border2); }

  .tweet-text {
    font-size: 13px;
    color: var(--text);
    line-height: 1.5;
    font-style: italic;
  }

  .card-footer {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .card-time {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--muted);
  }

  .outlet-tag {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--muted);
    border: 1px solid var(--border2);
    padding: 1px 7px;
    border-radius: 2px;
  }

  .lead-time {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--accent);
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .lead-time-wrap {
    position: relative;
    display: inline-block;
  }
  .lead-time-wrap .lead-tooltip {
    visibility: hidden;
    opacity: 0;
    background: #1a1d24;
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 11px;
    line-height: 1.5;
    border: 1px solid rgba(0,212,255,0.2);
    border-radius: 6px;
    padding: 7px 10px;
    width: 240px;
    position: absolute;
    bottom: calc(100% + 6px);
    left: 50%;
    transform: translateX(-50%);
    transition: opacity 0.15s ease;
    pointer-events: none;
    z-index: 100;
    white-space: normal;
  }
  .lead-time-wrap:hover .lead-tooltip {
    visibility: visible;
    opacity: 1;
  }

  /* CONFIDENCE METER */
  .confidence-wrap {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 6px;
    min-width: 100px;
  }

  .conf-label {
    font-family: var(--font-mono);
    font-size: 9px;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
    position: relative;
  }
  .conf-info {
    cursor: default;
    border-bottom: 1px dotted rgba(255,255,255,0.3);
  }
  .conf-info .conf-tooltip {
    visibility: hidden;
    opacity: 0;
    background: #1a1d24;
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 11px;
    line-height: 1.5;
    border: 1px solid rgba(0,212,255,0.2);
    border-radius: 6px;
    padding: 7px 10px;
    width: 220px;
    position: absolute;
    top: calc(100% + 6px);
    right: 0;
    transition: opacity 0.15s ease;
    pointer-events: none;
    z-index: 100;
    white-space: normal;
    letter-spacing: 0;
    text-transform: none;
  }
  .conf-info:hover .conf-tooltip {
    visibility: visible;
    opacity: 1;
  }

  .conf-score {
    font-family: var(--font-display);
    font-size: 36px;
    letter-spacing: 1px;
    line-height: 1;
  }

  .conf-high { color: var(--green); }
  .conf-med { color: var(--orange); }
  .conf-low { color: var(--red); }

  .conf-bar-wrap {
    width: 80px;
    height: 3px;
    background: var(--border2);
    border-radius: 2px;
    overflow: hidden;
  }

  .conf-bar {
    height: 100%;
    border-radius: 2px;
    transition: width 0.8s ease;
  }

  .conf-bar-high { background: var(--green); }
  .conf-bar-med { background: var(--orange); }
  .conf-bar-low { background: var(--red); }

  /* RIGHT SIDEBAR */
  .sidebar-right {
    border-left: 1px solid var(--border);
    padding: 24px 0;
    position: sticky;
    top: 90px;
    height: calc(100vh - 90px);
    overflow-y: auto;
  }

  .sidebar-right::-webkit-scrollbar { width: 3px; }
  .sidebar-right::-webkit-scrollbar-track { background: transparent; }
  .sidebar-right::-webkit-scrollbar-thumb { background: var(--border2); }

  .reporter-card {
    padding: 12px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
    cursor: default;
    transition: background 0.15s;
  }
  .reporter-card:hover {
    background: var(--surface2);
  }
  #reporter-hover-popup {
    display: none;
    position: fixed;
    background: #1a1d24;
    border: 1px solid rgba(0,212,255,0.2);
    border-radius: 8px;
    padding: 12px 14px;
    width: 210px;
    z-index: 9999;
    box-shadow: 0 8px 24px rgba(0,0,0,0.6);
  }
  .reporter-popup-name {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 4px;
  }
  .reporter-popup-outlet {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--muted);
    margin-bottom: 10px;
  }
  .reporter-popup-row {
    display: flex;
    justify-content: space-between;
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--muted);
    margin-bottom: 5px;
  }
  .reporter-popup-row span:last-child {
    color: var(--text);
  }
  .reporter-popup-link {
    display: block;
    margin-top: 10px;
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--accent);
    text-decoration: none;
    border: 1px solid rgba(0,212,255,0.25);
    border-radius: 4px;
    padding: 5px 8px;
    text-align: center;
    transition: background 0.15s;
  }
  .reporter-popup-link:hover {
    background: rgba(0,212,255,0.08);
  }

  .reporter-card-avatar {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: var(--surface2);
    border: 1px solid var(--border2);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--accent);
    flex-shrink: 0;
  }

  .reporter-card-name {
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
    margin-bottom: 2px;
  }

  .reporter-card-meta {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--muted);
  }

  .reporter-card-signal {
    margin-left: auto;
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 4px;
  }

  .signal-high { color: var(--green); }
  .signal-med { color: var(--orange); }

  /* STATS BAR */
  .stats-bar {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }

  .stat-cell {
    padding: 16px 20px;
    border-right: 1px solid var(--border);
    text-align: center;
  }

  .stat-cell:last-child { border-right: none; }

  .stat-val {
    font-family: var(--font-display);
    font-size: 32px;
    letter-spacing: 1px;
    line-height: 1;
    margin-bottom: 4px;
  }

  .stat-lbl {
    font-family: var(--font-mono);
    font-size: 9px;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
  }

  .val-red { color: var(--red); }
  .val-orange { color: var(--orange); }
  .val-yellow { color: var(--yellow); }
  .val-accent { color: var(--accent); }

  /* SEARCH */
  .search-wrap {
    padding: 16px 28px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }

  .search-input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border2);
    border-radius: 6px;
    padding: 9px 14px;
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 12px;
    outline: none;
    transition: border-color 0.15s;
  }

  .search-input::placeholder { color: var(--muted); }
  .search-input:focus { border-color: var(--accent); }

  /* EMPTY STATE */
  .empty-state {
    padding: 60px 28px;
    text-align: center;
    color: var(--muted);
    font-family: var(--font-mono);
    font-size: 12px;
    display: none;
  }

  .empty-state.show { display: block; }

  /* MOBILE */
  @media (max-width: 900px) {
    .main { grid-template-columns: 1fr; }
    .sidebar-left, .sidebar-right { display: none; }
  }
</style>
</head>
<body>
  <div id="reporter-hover-popup"></div>

<header>
  <div class="logo">
    <span class="logo-text">INJURYWIRE</span>
    <span class="logo-tag">NBA · BETA</span>
  </div>
  <div class="header-right">
    <div class="live-badge">
      <div class="live-dot"></div>
      MONITORING 212 REPORTERS
    </div>
    <div class="header-stat">LAST UPDATE <span id="last-update">just now</span></div>
    <div class="header-stat">SEASON <span>2025–26</span></div>
  </div>
</header>

<!-- TICKER -->
<div class="ticker-wrap">
  <div class="ticker-label">BREAKING</div>
  <div style="overflow:hidden;flex:1;">
    <div class="ticker-track" id="ticker"></div>
  </div>
</div>

<div class="main">
  <!-- LEFT SIDEBAR -->
  <div class="sidebar-left">
    <div class="section-label">STATUS FILTER</div>
    <div class="filter-group">
      <button class="filter-btn active" data-status="all" onclick="filterStatus('all', this)">

let allReports = [];
let filtered = [];
let currentTeam = 'all';
let currentStatus = 'all';
let currentSort = 'time';
let searchQuery = '';
let newItemIds = new Set();
let newItemTimes = new Map();

function initData() {
  allReports = INJURY_TEMPLATES.map((t, i) => ({
    ...t,
    id: i,
    timestamp: new Date(Date.now() - t.minsAgo * 60000),
    leadTime: Math.floor(Math.random() * 180 + 20)
  }));
  filtered = [...allReports];
}

// ─── TICKER ───────────────────────────────────────────────────────────────────
function buildTicker() {
  const items = allReports.filter(r => r.status === 'Out' || r.status === 'Questionable').slice(0, 8);
  const html = [...items, ...items].map(r =>
    `<span class="ticker-item">
      <span class="player">${r.player}</span>
      <span class="status-${r.status.toLowerCase().replace(' ','-').replace('-','')} status-pill" style="font-size:9px;padding:1px 6px">${r.status.toUpperCase()}</span>
      <span>${r.injury}</span>
      <span style="color:var(--border2)">·</span>
      <span>${r.team}</span>
      <span class="ticker-sep">///</span>
    </span>`
  ).join('');
  document.getElementById('ticker').innerHTML = html;
}

// ─── STATS ────────────────────────────────────────────────────────────────────
function updateStats() {
  const src = filtered.length ? filtered : allReports;
  document.getElementById('stat-out').textContent = src.filter(r => r.status === 'Out').length;
  document.getElementById('stat-q').textContent = src.filter(r => r.status === 'Questionable').length;
  document.getElementById('stat-gtd').textContent = src.filter(r => r.status === 'Game-Time Decision').length;
  const repCount = currentTeam === 'all' ? 212 : REPORTERS.filter(r => r.team === currentTeam || r.team === 'All Teams').length;
  document.getElementById('stat-monitored').textContent = repCount;
}

function animateNum(id, target) {
  const el = document.getElementById(id);
  let val = 0;
  const step = Math.ceil(target / 12);
  const t = setInterval(() => {
    val = Math.min(val + step, target);
    el.textContent = val;
    if (val >= target) clearInterval(t);
  }, 50);
}

// ─── TEAM LIST ────────────────────────────────────────────────────────────────
const ALL_TEAMS = ["Atlanta Hawks","Boston Celtics","Brooklyn Nets","Charlotte Hornets","Chicago Bulls","Cleveland Cavaliers","Dallas Mavericks","Denver Nuggets","Detroit Pistons","Golden State Warriors","Houston Rockets","Indiana Pacers","LA Clippers","Los Angeles Lakers","Memphis Grizzlies","Miami Heat","Milwaukee Bucks","Minnesota Timberwolves","New Orleans Pelicans","New York Knicks","Oklahoma City Thunder","Orlando Magic","Philadelphia 76ers","Phoenix Suns","Portland Trail Blazers","Sacramento Kings","San Antonio Spurs","Toronto Raptors","Utah Jazz","Washington Wizards"];

function buildTeamList() {
  const counts = {};
  const outs = {};
  allReports.forEach(r => { counts[r.team] = (counts[r.team] || 0) + 1; if(r.status==='Out') outs[r.team]=true; });
  const teams = ['All Teams', ...ALL_TEAMS];
  const html = teams.map(team => {
    const key = team === 'All Teams' ? 'all' : team;
    const count = team === 'All Teams' ? allReports.length : (counts[team] || 0);
    const hasOut = outs[team];
    const isActive = currentTeam === key;
    return `<button class="team-btn ${isActive ? 'active' : ''} ${hasOut ? 'has-out' : ''}" data-team="${key}" onclick="filterTeam('${key}', this)">${team}<span class="team-count">${count}</span></button>`;
  }).join('');
  document.getElementById('team-list').innerHTML = html;
}

// ─── REPORTER SIDEBAR ─────────────────────────────────────────────────────────
function buildReporterSidebar() {
  const reps = currentTeam === 'all'
    ? REPORTERS.filter(r => r.team === 'All Teams').concat(REPORTERS.filter(r => r.tier === 1 && r.team !== 'All Teams').slice(0, 12))
    : REPORTERS.filter(r => r.team === currentTeam || r.team === 'All Teams');
  const note = currentTeam === 'all'
    ? 'National insiders + Tier 1 beat reporters'
    : `${reps.length} reporter${reps.length !== 1 ? 's' : ''} covering ${currentTeam}`;
  const html = reps.map(r => {
    const initials = r.name.split(' ').map(n => n[0]).join('').slice(0,2);
    const twitterUrl = `https://x.com/${r.handle.replace('@','')}`;
    const signalColor = r.signal === 'High' ? 'var(--green)' : 'var(--orange)';
    const dataAttr = encodeURIComponent(JSON.stringify({name:r.name,outlet:r.outlet,handle:r.handle,team:r.team,tier:r.tier,signal:r.signal,followers:r.followers,twitterUrl,signalColor}));
    return `<div class="reporter-card" data-rep="${dataAttr}" onmouseenter="showRepPopup(event,this)" onmouseleave="hideRepPopup()">
      <div class="reporter-card-avatar">${initials}</div>
      <div>
        <div class="reporter-card-name">${r.name}</div>
        <div class="reporter-card-meta">${r.handle} · ${r.outlet.split('/')[0].trim()}</div>
      </div>
      <div class="reporter-card-signal">
        <span class="tier-badge tier-${r.tier}">T${r.tier}</span>
        <span style="font-family:var(--font-mono);font-size:9px" class="${r.signal === 'High' ? 'signal-high' : 'signal-med'}">${r.signal.toUpperCase()}</span>
      </div>
    </div>`;
  }).join('');
  document.getElementById('section-label-rhs').textContent = note;
  document.getElementById('reporter-list').innerHTML = html;
}

// ─── RENDER FEED ──────────────────────────────────────────────────────────────
function applyFilters() {
  filtered = allReports.filter(r => {
    const teamMatch = currentTeam === 'all' || r.team === currentTeam;
    const statusMatch = currentStatus === 'all' || r.status === currentStatus;
    const searchMatch = !searchQuery ||
      r.player.toLowerCase().includes(searchQuery) ||
      r.team.toLowerCase().includes(searchQuery) ||
      r.injury.toLowerCase().includes(searchQuery) ||
      r.body.toLowerCase().includes(searchQuery) ||
      r.status.toLowerCase().includes(searchQuery) ||
      r.reporter.toLowerCase().includes(searchQuery) ||
      r.handle.toLowerCase().includes(searchQuery) ||
      r.outlet.toLowerCase().includes(searchQuery) ||
      r.tweet.toLowerCase().includes(searchQuery);
    return teamMatch && statusMatch && searchMatch;
  });

  if (currentSort === 'confidence') filtered.sort((a, b) => b.confidence - a.confidence);
  else if (currentSort === 'status') {
    const order = { 'Out': 0, 'Doubtful': 1, 'Questionable': 2, 'Game-Time Decision': 3, 'Probable': 4 };
    filtered.sort((a, b) => (order[a.status] ?? 5) - (order[b.status] ?? 5));
  } else {
    filtered.sort((a, b) => b.timestamp - a.timestamp);
  }

  renderFeed();
  buildReporterSidebar();
  updateStats();
}

function statusClass(s) {
  const m = { 'Out': 'status-out', 'Questionable': 'status-questionable', 'Doubtful': 'status-doubtful', 'Game-Time Decision': 'status-gtd', 'Probable': 'status-probable' };
  return m[s] || 'status-questionable';
}

function confClass(c) {
  if (c >= 0.85) return ['conf-high', 'conf-bar-high'];
  if (c >= 0.70) return ['conf-med', 'conf-bar-med'];
  return ['conf-low', 'conf-bar-low'];
}

function timeAgo(ts) {
  const diff = Math.floor((Date.now() - ts) / 60000);
  if (diff < 1) return 'just now';
  if (diff < 60) return diff + 'm ago';
  return Math.floor(diff / 60) + 'h ' + (diff % 60) + 'm ago';
}

function renderFeed() {
  const feed = document.getElementById('feed');
  const empty = document.getElementById('empty-state');
  const meta = document.getElementById('feed-meta');
  meta.textContent = `${filtered.length} report${filtered.length !== 1 ? 's' : ''} · ${allReports.length} total monitored`;

  if (filtered.length === 0) {
    feed.innerHTML = '';
    empty.classList.add('show');
    return;
  }
  empty.classList.remove('show');

  feed.innerHTML = filtered.map((r, idx) => {
    const [cScoreClass, cBarClass] = confClass(r.confidence);
    const isNew = newItemIds.has(r.id);
    const delay = idx * 40;
    return `<div class="injury-card ${isNew ? 'new-item' : ''}" style="animation-delay:${delay}ms">
      <div>
        <div class="card-top">
          <span class="status-pill ${statusClass(r.status)}">${r.status}</span>
          <span class="card-team">${r.team.toUpperCase()}</span>
          ${isNew ? `<span class="card-new">● NEW</span><span style="font-family:var(--font-mono);font-size:9px;color:var(--muted)">${Math.ceil(Math.max(0,600000-(Date.now()-(newItemTimes.get(r.id)||Date.now())))/60000)}m left</span>` : ''}
        </div>
        <div class="player-name">${r.player.toUpperCase()}</div>
        <div class="injury-detail"><strong>${r.injury}</strong> · ${r.body} · ${r.team}</div>
        <div class="tweet-box">
          <div class="tweet-reporter">
            <div class="reporter-avatar">${r.handle.slice(1,3).toUpperCase()}</div>
            <div>
              <div class="reporter-info-name">${r.reporter}</div>
              <div class="reporter-info-handle">${r.handle} · ${r.outlet}</div>
            </div>
            <span class="tier-badge tier-${r.tier}">TIER ${r.tier}</span>
          </div>
          <div class="tweet-text">"${r.tweet}"</div>
        </div>
        <div class="card-footer">
          <span class="card-time">${timeAgo(r.timestamp)}</span>
          <span class="outlet-tag">${r.outlet.split('/')[0].trim()}</span>
          <span class="lead-time-wrap">
            <span class="lead-time" style="cursor:default;border-bottom:1px dotted rgba(0,212,255,.4)">⚡ ~${r.leadTime}min est. lead</span>
            <span class="lead-tooltip">How many minutes ahead of the official NBA injury report this reporter's tweet surfaced the same information.</span>
          </span>
        </div>
      </div>
      <div class="confidence-wrap">
        <span class="conf-label">CONFIDENCE <span class="conf-info">ⓘ<span class="conf-tooltip">Score from 0–100 reflecting how reliable this injury report is, based on the reporter's tier, outlet credibility, and specificity of the tweet language.</span></span></span>
        <span class="conf-score ${cScoreClass}">${Math.round(r.confidence * 100)}</span>
        <div class="conf-bar-wrap">
          <div class="conf-bar ${cBarClass}" style="width:${r.confidence * 100}%"></div>
        </div>
        <div style="font-family:var(--font-mono);font-size:9px;color:var(--muted);text-align:right;line-height:1.8;margin-top:4px">
          <div>Reporter tier &nbsp;<span style="color:var(--text)">+${r.tier===1?40:25}</span></div>
          <div>Injury signal &nbsp;<span style="color:var(--text)">+${r.tier===1?35:20}</span></div>
          <div>Tweet language <span style="color:var(--text)">+${Math.round(r.confidence*100)-(r.tier===1?75:45)}</span></div>
        </div>
      </div>
    </div>`;
  }).join('');
}

// ─── CONTROLS ────────────────────────────────────────────────────────────────
function filterTeam(team, btn) {
  currentTeam = team;
  document.querySelectorAll('.team-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const title = team === 'all' ? 'INJURY FEED' : team.toUpperCase();
  document.getElementById('feed-title').textContent = title;
  applyFilters();
}

function filterStatus(status, btn) {
  currentStatus = status;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  applyFilters();
}

function sortFeed(sort, btn) {
  currentSort = sort;
  document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  applyFilters();
}

function searchFeed(q) {
  searchQuery = q.toLowerCase().trim();
  applyFilters();
}

// ─── LIVE SIMULATION ──────────────────────────────────────────────────────────
const NEW_TWEETS = [
  { player:"Anthony Edwards", team:"Minnesota Timberwolves", injury:"Knee soreness", body:"knee", status:"Questionable", confidence:0.83, reporter:"Dane Moore", handle:"@DaneMooreNBA", outlet:"Dane Moore NBA Podcast", tier:1, tweet:"Ant is questionable tonight. Knee soreness. He was limited at shootaround — going through his usual pregame treatment. I'd call this about 50-50 right now.", minsAgo:0 },
  { player:"Zion Williamson", team:"New Orleans Pelicans", injury:"Hamstring", body:"hamstring", status:"Out", confidence:0.98, reporter:"Christian Clark", handle:"@cclark_nola", outlet:"Times-Picayune", tier:1, tweet:"Zion Williamson is out tonight. Hamstring. He did not travel with the team and was ruled out this morning. No timeline for return provided.", minsAgo:0 },
  { player:"Jaren Jackson Jr.", team:"Memphis Grizzlies", injury:"Ankle sprain", body:"ankle", status:"Game-Time Decision", confidence:0.74, reporter:"Shams Charania", handle:"@ShamsCharania", outlet:"ESPN", tier:1, tweet:"Jaren Jackson Jr. is a game-time decision tonight with a right ankle sprain sustained in Monday's practice. Grizzlies monitoring him through warmups.", minsAgo:0 },
];
let newTweetIdx = 0;

function pushNewReport() {
  if (newTweetIdx >= NEW_TWEETS.length) return;
  const t = NEW_TWEETS[newTweetIdx++];
  const newReport = {
    ...t,
    id: allReports.length,
    timestamp: new Date(),
    leadTime: Math.floor(Math.random() * 120 + 15)
  };
  allReports.unshift(newReport);
  newItemIds.add(newReport.id);
  newItemTimes.set(newReport.id, Date.now());
  setTimeout(() => { newItemIds.delete(newReport.id); newItemTimes.delete(newReport.id); }, 600000);
  updateStats();
  buildTicker();
  applyFilters();
  document.getElementById('last-update').textContent = 'just now';
}

function updateTimes() {
  document.querySelectorAll('.card-time').forEach((el, i) => {
    if (filtered[i]) el.textContent = timeAgo(filtered[i].timestamp);
  });
  const mins = Math.floor((Date.now() - (allReports[0]?.timestamp || Date.now())) / 60000);
  document.getElementById('last-update').textContent = mins < 1 ? 'just now' : mins + 'm ago';
}

// ─── REPORTER POPUP ───────────────────────────────────────────────────────────
let repPopupHideTimer = null;
function showRepPopup(e, el) {
  clearTimeout(repPopupHideTimer);
  const r = JSON.parse(decodeURIComponent(el.dataset.rep));
  const popup = document.getElementById('reporter-hover-popup');
  popup.innerHTML = `
    <div class="reporter-popup-name">${r.name}</div>
    <div class="reporter-popup-outlet">${r.outlet}</div>
    <div class="reporter-popup-row"><span>Handle</span><span>${r.handle}</span></div>
    <div class="reporter-popup-row"><span>Team</span><span>${r.team === 'All Teams' ? 'National' : r.team}</span></div>
    <div class="reporter-popup-row"><span>Tier</span><span>Tier ${r.tier}</span></div>
    <div class="reporter-popup-row"><span>Injury Signal</span><span style="color:${r.signalColor}">${r.signal}</span></div>
    <div class="reporter-popup-row"><span>Followers</span><span>${r.followers}</span></div>
    <a class="reporter-popup-link" href="${r.twitterUrl}" target="_blank">↗ View on X / Twitter</a>
  `;
  popup.style.display = 'block';
  const rect = el.getBoundingClientRect();
  popup.style.top = `${rect.top + rect.height / 2 - popup.offsetHeight / 2}px`;
  popup.style.left = `${rect.left - 222}px`;
  popup.onmouseenter = () => clearTimeout(repPopupHideTimer);
  popup.onmouseleave = () => scheduleHideRepPopup();
}
function scheduleHideRepPopup() {
  repPopupHideTimer = setTimeout(() => {
    document.getElementById('reporter-hover-popup').style.display = 'none';
  }, 120);
}
function hideRepPopup() {
  scheduleHideRepPopup();
}

initData();

updateStats();
buildTeamList();
buildReporterSidebar();
applyFilters();

setTimeout(() => pushNewReport(), 8000);
setTimeout(() => pushNewReport(), 22000);
setTimeout(() => pushNewReport(), 42000);
setInterval(updateTimes, 30000);
</script>
